<!DOCTYPE html>
<html lang="ko"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <!-- PWA 및 모바일 대응 설정 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">

    <title>영어 통합 학습관</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', -apple-system, sans-serif;
            overflow: hidden;
            background-color: #f5f6fa;
        }

        /* 🌟 1. 인트로 영상 화면 CSS 추가 */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000; /* 영상 로딩 전 검은 배경 */
            z-index: 9999; /* 가장 위에 표시 */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease; /* 부드럽게 사라지는 효과 */
        }
        
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 화면 비율에 맞게 꽉 채움. 짤리는게 싫으면 contain으로 변경 */
        }

        #skip-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            z-index: 10000;
            transition: background 0.3s;
        }

        #skip-btn:hover {
            background-color: rgba(255, 255, 255, 0.6);
        }

        /* 인트로가 사라질 때 쓸 클래스 */
        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        /* 상단 메뉴바 */
        .header {
            height: 55px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            z-index: 10;
            position: relative;
        }
        .header .title {
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        /* 탭 버튼 그룹 */
        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap; 
            justify-content: center;
        }
        .btn {
            background-color: #34495e;
            color: #ecf0f1;
            border: none;
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }
        .btn:hover {
            background-color: #455a6f;
        }
        .btn.active {
            background-color: #3498db;
            color: white;
            font-weight: bold;
        }
        
        /* 전체 화면 및 외부 링크 그룹 */
        .util-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-util {
            background-color: transparent;
            color: #bdc3c7;
            border: 1px solid #7f8c8d;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-util:hover {
            color: white;
            border-color: white;
        }
        .links-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .links-group a {
            color: #bdc3c7;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
            white-space: nowrap;
        }
        .links-group a:hover {
            color: white;
        }

        /* 메인 컨텐츠 영역 */
        .main-container {
            display: flex;
            height: calc(100% - 55px);
            width: 100%;
            background-color: #ffffff;
        }
        .pane {
            height: 100%;
            width: 100%;
            display: none; /* 기본 숨김 */
        }
        .pane iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 활성화 상태에 따른 화면 표시 */
        .view-left #pane-left { display: block; }
        .view-right #pane-right { display: block; }
        .view-blank #pane-blank { display: block; }
        .view-arrange #pane-arrange { display: block; } 

        /* 모바일 대응 (화면이 작을 때 상단바 자동 조절) */
        @media (max-width: 850px) {
            .header {
                flex-direction: column;
                height: auto;
                padding: 10px;
                gap: 10px;
            }
            .main-container {
                height: calc(100% - 110px); 
            }
            .title { display: none; } 
        }
    </style>
</head>
<body class="view-left"> 

    <!-- 🌟 2. 인트로 영상 영역 추가 -->
    <div id="intro-screen">
        <!-- 모바일 자동 재생을 위해 muted와 playsinline 필수 -->
        <video id="intro-video" autoplay muted playsinline>
            <!-- 여기에 실제 비디오 파일 경로를 넣어주세요 -->
            <source src="park.mp4" type="video/mp4">
            브라우저가 동영상을 지원하지 않습니다.
        </video>
        <button id="skip-btn" onclick="closeIntro()">Skip ➔</button>
    </div>

    <header class="header">
        <span class="title">영어 통합 학습관</span>
        
        <div class="btn-group">
            <button id="btn-left" class="btn active" onclick="changeView('left')">지문 보기</button>
            <button id="btn-right" class="btn" onclick="changeView('right')">플래시카드</button>
            <button id="btn-blank" class="btn" onclick="changeView('blank')">지문 빈칸</button>
            <button id="btn-arrange" class="btn" onclick="changeView('arrange')">배열 연습</button> 
        </div>
        
        <div class="util-group">
            <button class="btn-util" onclick="toggleFullScreen()">전체화면</button>
            <div class="links-group">
                <a href="https://ryul0520.github.io/eng/" target="_blank">지문 ↗</a>
                <a href="https://ryul0520.github.io/eng_flash/" target="_blank">카드 ↗</a>
                <a href="https://ryul0520.github.io/eng_emp/" target="_blank">빈칸 ↗</a>
                <a href="https://ryul0520.github.io/eng_arrange/" target="_blank">배열 ↗</a> 
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="pane" id="pane-left">
            <iframe src="https://ryul0520.github.io/eng/"></iframe>
        </div>
        
        <div class="pane" id="pane-right">
            <iframe src="https://ryul0520.github.io/eng_flash/"></iframe>
        </div>

        <div class="pane" id="pane-blank">
            <iframe src="https://ryul0520.github.io/eng_emp/"></iframe>
        </div>

        <div class="pane" id="pane-arrange">
            <iframe src="https://ryul0520.github.io/eng_arrange/"></iframe>
        </div>
    </main>

    <script>
        // 🌟 3. 인트로 제어 스크립트
        const introScreen = document.getElementById('intro-screen');
        const introVideo = document.getElementById('intro-video');

        // 인트로 종료 함수 (부드럽게 페이드아웃 후 제거)
        function closeIntro() {
            introScreen.classList.add('fade-out');
            setTimeout(() => {
                introScreen.style.display = 'none';
            }, 500); // CSS의 transition 시간(0.5s)과 동일하게 설정
        }

        // 동영상 재생이 자연스럽게 끝났을 때 자동으로 닫힘
        introVideo.addEventListener('ended', closeIntro);

        // 만약 영상 경로가 잘못되었거나 로딩에 실패하면 즉시 앱 화면을 보여줌
        introVideo.addEventListener('error', closeIntro);

        // 기존 뷰(탭) 변경 기능
        function changeView(viewType) {
            const body = document.body;
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnBlank = document.getElementById('btn-blank');
            const btnArrange = document.getElementById('btn-arrange'); 

            btnLeft.classList.remove('active');
            btnRight.classList.remove('active');
            btnBlank.classList.remove('active');
            btnArrange.classList.remove('active');

            if (viewType === 'left') {
                body.className = 'view-left';
                btnLeft.classList.add('active');
            } else if (viewType === 'right') {
                body.className = 'view-right';
                btnRight.classList.add('active');
            } else if (viewType === 'blank') {
                body.className = 'view-blank';
                btnBlank.classList.add('active');
            } else if (viewType === 'arrange') { 
                body.className = 'view-arrange';
                btnArrange.classList.add('active');
            }
        }

        // 전체화면 토글 기능
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`전체화면 모드를 시작할 수 없습니다: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // 서비스 워커 등록 (PWA용)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('서비스 워커가 정상적으로 등록되었습니다.', reg))
                    .catch((err) => console.log('서비스 워커 등록 실패:', err));
            });
        }
    </script>
</body>
</html>
