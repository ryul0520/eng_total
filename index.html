<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <!-- PWA 및 모바일 대응 설정 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">

    <title>영어 통합 학습관</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', -apple-system, sans-serif;
            overflow: hidden;
            background-color: #f5f6fa;
        }
        
        /* 상단 메뉴바 */
        .header {
            height: 55px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            z-index: 10;
            position: relative;
        }
        .header .title {
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        /* 탭 버튼 그룹 */
        .btn-group {
            display: flex;
            gap: 6px;
        }
        .btn {
            background-color: #34495e;
            color: #ecf0f1;
            border: none;
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }
        .btn:hover {
            background-color: #455a6f;
        }
        .btn.active {
            background-color: #3498db;
            color: white;
            font-weight: bold;
        }
        
        /* 전체 화면 및 외부 링크 그룹 */
        .util-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-util {
            background-color: transparent;
            color: #bdc3c7;
            border: 1px solid #7f8c8d;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-util:hover {
            color: white;
            border-color: white;
        }
        .links-group {
            display: flex;
            gap: 12px;
        }
        .links-group a {
            color: #bdc3c7;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
            white-space: nowrap;
        }
        .links-group a:hover {
            color: white;
        }

        /* 메인 컨텐츠 영역 */
        .main-container {
            display: flex;
            height: calc(100% - 55px);
            width: 100%;
            background-color: #ffffff;
        }
        .pane {
            height: 100%;
            width: 100%;
            display: none; /* 기본 숨김 */
        }
        .pane iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 활성화 상태에 따른 화면 표시 */
        .view-left #pane-left { display: block; }
        .view-right #pane-right { display: block; }
        .view-blank #pane-blank { display: block; } /* 🌟 추가된 빈칸 채우기 화면 */

        /* 모바일 대응 (화면이 작을 때 상단바 자동 조절) */
        @media (max-width: 850px) {
            .header {
                flex-direction: column;
                height: auto;
                padding: 10px;
                gap: 10px;
            }
            .main-container {
                height: calc(100% - 100px);
            }
            .title { display: none; } /* 모바일에서는 제목 숨기기 */
        }
    </style>
</head>
<body class="view-left"> <!-- 기본적으로 지문 보기가 활성화됩니다 -->

    <header class="header">
        <span class="title">영어 통합 학습관</span>
        
        <!-- 중앙 탭 버튼 -->
        <div class="btn-group">
            <button id="btn-left" class="btn active" onclick="changeView('left')">지문 보기</button>
            <button id="btn-right" class="btn" onclick="changeView('right')">플래시카드</button>
            <button id="btn-blank" class="btn" onclick="changeView('blank')">지문 빈칸</button>
        </div>
        
        <!-- 우측 도구 및 링크 -->
        <div class="util-group">
            <button class="btn-util" onclick="toggleFullScreen()">전체화면</button>
            <div class="links-group">
                <a href="https://ryul0520.github.io/eng/" target="_blank">지문 ↗</a>
                <a href="https://ryul0520.github.io/eng_flash/" target="_blank">카드 ↗</a>
                <a href="https://ryul0520.github.io/eng_emp/" target="_blank">빈칸 ↗</a>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- 1. 영어 지문 영역 -->
        <div class="pane" id="pane-left">
            <iframe src="https://ryul0520.github.io/eng/"></iframe>
        </div>
        
        <!-- 2. 플래쉬 카드 영역 -->
        <div class="pane" id="pane-right">
            <iframe src="https://ryul0520.github.io/eng_flash/"></iframe>
        </div>

        <!-- 3. 🌟 지문 빈칸 영역 추가 -->
        <div class="pane" id="pane-blank">
            <iframe src="https://ryul0520.github.io/eng_emp/"></iframe>
        </div>
    </main>

    <script>
        // 뷰(탭) 변경 기능
        function changeView(viewType) {
            const body = document.body;
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnBlank = document.getElementById('btn-blank');

            // 버튼 스타일 초기화
            btnLeft.classList.remove('active');
            btnRight.classList.remove('active');
            btnBlank.classList.remove('active');

            // 해당하는 영역 노출 및 버튼 활성화
            if (viewType === 'left') {
                body.className = 'view-left';
                btnLeft.classList.add('active');
            } else if (viewType === 'right') {
                body.className = 'view-right';
                btnRight.classList.add('active');
            } else if (viewType === 'blank') {
                body.className = 'view-blank';
                btnBlank.classList.add('active');
            }
        }

        // 전체화면 토글 기능
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`전체화면 모드를 시작할 수 없습니다: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // 서비스 워커 등록 (PWA용)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('서비스 워커가 정상적으로 등록되었습니다.', reg))
                    .catch((err) => console.log('서비스 워커 등록 실패:', err));
            });
        }
    </script>
</body>
</html>
