<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 통합 학습관</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', -apple-system, sans-serif;
            overflow: hidden;
            background-color: #f5f6fa;
        }
        
        /* 상단 메뉴바 */
        .header {
            height: 50px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            z-index: 10;
            position: relative;
        }
        .header .title {
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        .btn-group {
            display: flex;
            gap: 6px;
        }
        .btn {
            background-color: #34495e;
            color: #ecf0f1;
            border: none;
            padding: 6px 16px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn:hover {
            background-color: #455a6f;
        }
        .btn.active {
            background-color: #3498db;
            color: white;
            font-weight: bold;
        }
        .links-group a {
            color: #bdc3c7;
            text-decoration: none;
            font-size: 12px;
            margin-left: 15px;
            transition: color 0.2s;
        }
        .links-group a:hover {
            color: white;
        }

        /* 메인 컨텐츠 영역 */
        .main-container {
            display: flex;
            height: calc(100% - 50px);
            width: 100%;
            background-color: #ffffff;
        }
        .pane {
            height: 100%;
            width: 100%;
            display: none; /* 기본적으로는 숨김 처리 */
        }
        .pane iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 활성화 상태에 따른 화면 표시 */
        .view-left #pane-left { display: block; }
        .view-right #pane-right { display: block; }
    </style>
</head>
<body class="view-left"> <!-- 기본적으로 지문 보기가 활성화됩니다 -->

    <header class="header">
        <span class="title">영어 통합 학습관</span>
        <div class="btn-group">
            <button id="btn-left" class="btn active" onclick="changeView('left')">지문 보기</button>
            <button id="btn-right" class="btn" onclick="changeView('right')">플래시카드 보기</button>
        </div>
        <div class="links-group">
            <a href="https://ryul0520.github.io/eng/" target="_blank">지문 새창 ↗</a>
            <a href="https://ryul0520.github.io/eng_flash/" target="_blank">플래시카드 새창 ↗</a>
        </div>
    </header>

    <main class="main-container">
        <!-- 영어 지문 영역 -->
        <div class="pane" id="pane-left">
            <iframe src="https://ryul0520.github.io/eng/"></iframe>
        </div>
        
        <!-- 플래쉬 카드 영역 -->
        <div class="pane" id="pane-right">
            <iframe src="https://ryul0520.github.io/eng_flash/"></iframe>
        </div>
    </main>

    <script>
        function changeView(viewType) {
            const body = document.body;
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');

            // 버튼 스타일 초기화
            btnLeft.classList.remove('active');
            btnRight.classList.remove('active');

            // 해당하는 영역 노출 및 버튼 활성화
            if (viewType === 'left') {
                body.className = 'view-left';
                btnLeft.classList.add('active');
            } else if (viewType === 'right') {
                body.className = 'view-right';
                btnRight.classList.add('active');
            }
        }
    </script>
</body>
</html>
